<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}Tarea 1 BD{% endblock %}</title>
    
    <style>
        :root {
            --bg: #0f172a;
            --panel: rgba(15, 23, 42, 0.82);
            --panel-soft: rgba(30, 41, 59, 0.9);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --accent-strong: #0ea5e9;
            --border: rgba(148, 163, 184, 0.18);
            --shadow: 0 20px 50px rgba(2, 6, 23, 0.45);
        }

        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .page-shell {
            width: min(1120px, calc(100% - 32px));
            margin: 0 auto;
            padding: 24px 0 40px;
        }

        header {
            position: sticky;
            top: 16px;
            z-index: 10;
            margin-bottom: 24px;
            padding: 18px 20px;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: rgba(15, 23, 42, 0.88);
            backdrop-filter: blur(14px);
            box-shadow: var(--shadow);
        }

        header h1 {
            margin: 0 0 12px;
            font-size: 1.5rem;
            letter-spacing: 0.02em;
        }

        header h2 {
            margin: 0 0 12px;
            font-size: 1.25rem;
            letter-spacing: 0.02em;
        }

        nav {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        nav a {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--panel);
            color: var(--text);
            text-decoration: none;
            transition: background-color 0.2s, color 0.2s;
        }

        nav a:hover {
            background-color: var(--accent);
            color: #fff;
        }

        main {
            padding: 8px 2px 0;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background-color: var(--accent);
            color: #fff;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .panel {
            padding: 24px;
            border: 1px solid var(--border);
            border-radius: 22px;
            background: var(--panel);
            box-shadow: var(--shadow);
        }

        .hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            align-items: center;
        }

        .hero h2 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 4vw, 3.4rem);
            line-height: 1.05;
        }

        .hero p,
        p {
            color: var(--muted);
            line-height: 1.6;
        }

        .hero-actions {
            display: flex;
            gap: 12px;
        }

        .button-link {
            padding: 12px 16px;
            border-radius: 14px;
            text-decoration: none;
            color: white;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            box-shadow: 0 10px 24px rgba(14, 165, 233, 0.28);
        }

        .quick-grid {
            display: grid;
            gap: 16px;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            margin-top: 22px;
        }

        .quick-card {
            padding: 18px;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: var(--panel-soft);
            text-decoration: none;
            color: var(--text);
            transition: transform 0.18s ease, border-color 0.18s ease;
        }

        .quick-card:hover {
            transform: translateY(-2px);
            border-color: rgba(56, 189, 248, 0.45);
        }

        .quick-card h3 {
            margin: 0 0 8px;
            font-size: 1.05rem;
        }

        .quick-card p {
            margin: 0;
            font-size: 0.95rem;
        }

        .filters-bar {
            display: grid;
            grid-template-columns: minmax(220px, 1fr) auto;
            gap: 14px;
            align-items: end;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: rgba(15, 23, 42, 0.35);
        }

        .field-group {
            display: grid;
            gap: 8px;
        }

        .field-group label {
            font-size: 0.92rem;
            color: #cbd5e1;
            font-weight: 700;
        }

        .field-group select {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.92);
            color: var(--text);
            outline: none;
        }

        .field-group select:focus {
            border-color: rgba(56, 189, 248, 0.55);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.12);
        }

        .actions-group {
            min-width: 160px;
        }

        .section-stack {
            display: grid;
            gap: 22px;
            margin-bottom: 20px;
        }

        .section-title {
            margin: 0 0 6px;
            font-size: clamp(1.5rem, 3vw, 2.2rem);
        }

        .tournament-grid {
            display: grid;
            gap: 14px;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        }

        .tournament-card {
            display: block;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: var(--panel-soft);
            text-decoration: none;
            color: var(--text);
            transition: border-color 0.18s ease, transform 0.18s ease;
        }

        .tournament-card:hover {
            border-color: rgba(56, 189, 248, 0.45);
            transform: translateY(-2px);
        }

        .tournament-card h3 {
            margin: 0 0 6px;
            font-size: 1.05rem;
        }

        .tournament-card p {
            margin: 0;
            font-size: 0.92rem;
        }

        .table-wrap {
            width: 100%;
            overflow-x: auto;
            border: 1px solid var(--border);
            border-radius: 14px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 640px;
            background: rgba(15, 23, 42, 0.36);
        }

        .data-table th,
        .data-table td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .data-table thead th {
            color: #dbeafe;
            background: rgba(14, 165, 233, 0.12);
            font-weight: 700;
            letter-spacing: 0.01em;
        }

        .data-table tbody tr:hover {
            background: rgba(30, 41, 59, 0.55);
        }

        .data-table .amount {
            font-weight: 600;
            color: #86efac;
        }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .tag-list li {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: rgba(30, 41, 59, 0.75);
        }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 8px 14px;
        }

        .empty-state {
            margin: 0;
            padding: 14px;
            border: 1px dashed rgba(148, 163, 184, 0.35);
            border-radius: 12px;
            background: rgba(30, 41, 59, 0.5);
            color: #cbd5e1;
        }

        .search-form {
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: rgba(15, 23, 42, 0.35);
        }

        .search-grid {
            display: grid;
            gap: 14px;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            margin-bottom: 14px;
        }

        .field-group input {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.92);
            color: var(--text);
            outline: none;
        }

        .field-group input::placeholder {
            color: #64748b;
        }

        .field-group input:focus {
            border-color: rgba(56, 189, 248, 0.55);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.12);
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge-captain {
            background: rgba(34, 197, 94, 0.18);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .badge-member {
            background: rgba(148, 163, 184, 0.15);
            color: #cbd5e1;
            border: 1px solid rgba(148, 163, 184, 0.25);
        }

        .badge-danger {
            background: rgba(239, 68, 68, 0.18);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .alert {
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid transparent;
            font-weight: 600;
        }

        .alert-error {
            background: rgba(127, 29, 29, 0.35);
            border-color: rgba(248, 113, 113, 0.35);
            color: #fecaca;
        }

        .alert-success {
            background: rgba(20, 83, 45, 0.35);
            border-color: rgba(74, 222, 128, 0.3);
            color: #bbf7d0;
        }

        @media (max-width: 720px) {
            .page-shell {
                width: min(1120px, calc(100% - 20px));
            }

            .panel {
                padding: 16px;
            }

            .search-grid {
                grid-template-columns: 1fr;
            }
        }

        </style>
</head>
<body>
    <div class="page-shell">
        <header>
            <h1>Torneos de Gaming - Tarea 1 BD</h1>
            <nav>
                <a href="/">Inicio</a>
                <a href="/torneos">Torneos</a>
                <a href="/estadisticas">Estadísticas</a>
                <a href="/busqueda">Búsqueda</a>
                <a href="/sponsors">Sponsors</a>
                <a href="/inscripcion">Inscripción</a>
            </nav>
        </header>
        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
